loader: taskgraph.loader.transform:loader

kind-dependencies:
    - toolchain

transforms:
    - taskgraph.transforms.use_toolchains:transforms
    - taskgraph.transforms.job:transforms
    - taskgraph.transforms.task:transforms

job-defaults:
    run-on-projects: ['mozilla-beta', 'trunk', 'try']
    treeherder:
        tier: 2
        kind: other

jobs:
    lint-tidy:
        description: Runs linting checks on WebRender code
        worker-type: aws-provisioner-v1/gecko-{level}-b-linux
        worker:
            max-run-time: 1800
            docker-image: {in-tree: webrender}
            env:
                RUST_BACKTRACE: 'full'
                RUSTFLAGS: '--deny warnings'
        run:
            using: run-task
            command:
                - /bin/bash
                - '--login'
                - '-cx'
                - >-
                  cd $HOME &&
                  cd $HOME/checkouts/gecko/gfx/wr &&
                  servo-tidy
        treeherder:
            platform: linux64-qr/opt
            symbol: WR(tidy)
        when:
            files-changed:
                - 'gfx/wr/**'

    linux-release:
        description: Runs release-mode WebRender CI tests on a Linux worker
        worker-type: aws-provisioner-v1/gecko-{level}-b-linux
        worker:
            max-run-time: 3600
            docker-image: {in-tree: webrender}
            env:
                RUST_BACKTRACE: 'full'
                RUSTFLAGS: '--deny warnings'
        toolchains:
            - linux64-rust
            - wrench-deps
        run:
            using: run-task
            command:
                - /bin/bash
                - '--login'
                - '-cx'
                - >-
                  cd $HOME/workspace &&
                  $HOME/checkouts/gecko/mach artifact toolchain -v $MOZ_TOOLCHAINS &&
                  export PATH=$PATH:$PWD/rustc/bin &&
                  cd $HOME/checkouts/gecko/gfx/wr &&
                  mv $HOME/workspace/vendored/.cargo ./ &&
                  CARGOFLAGS="--verbose --frozen" ci-scripts/linux-release-tests.sh
        treeherder:
            platform: linux64-qr/opt
            symbol: WR(wrench)
            kind: other
        when:
            files-changed:
                - 'gfx/wr/**'

    linux-debug:
        description: Runs debug-mode WebRender CI tests on a Linux worker
        worker-type: aws-provisioner-v1/gecko-{level}-b-linux
        worker:
            max-run-time: 3600
            docker-image: {in-tree: webrender}
            env:
                RUST_BACKTRACE: 'full'
                RUSTFLAGS: '--deny warnings'
        toolchains:
            - linux64-rust
            - wrench-deps
        run:
            using: run-task
            command:
                - /bin/bash
                - '--login'
                - '-cx'
                - >-
                  cd $HOME/workspace &&
                  $HOME/checkouts/gecko/mach artifact toolchain -v $MOZ_TOOLCHAINS &&
                  export PATH=$PATH:$PWD/rustc/bin &&
                  cd $HOME/checkouts/gecko/gfx/wr &&
                  mv $HOME/workspace/vendored/.cargo ./ &&
                  CARGOFLAGS="--verbose --frozen" ci-scripts/linux-release-tests.sh
        treeherder:
            platform: linux64-qr/debug
            symbol: WR(wrench)
            kind: other
        when:
            files-changed:
                - 'gfx/wr/**'
